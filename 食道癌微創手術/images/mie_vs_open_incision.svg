<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 480" font-family="Arial, sans-serif">
  <!-- Title -->
  <text x="375" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#333">微創手術 vs 傳統開胸手術 切口比較</text>
  <text x="375" y="48" text-anchor="middle" font-size="12" fill="#666">Minimally Invasive vs Open Esophagectomy - Incision Comparison</text>

  <!-- ===== Left: Open Surgery ===== -->
  <text x="190" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#F44336">傳統開胸手術 Open</text>

  <!-- Torso outline - left -->
  <path d="M110,100 Q100,100 95,120 L85,200 Q80,250 85,320 L90,380 Q95,410 110,420 L270,420 Q285,410 290,380 L295,320 Q300,250 295,200 L285,120 Q280,100 270,100 Z" fill="#FFE0B2" stroke="#E65100" stroke-width="1.5"/>

  <!-- Nipple markers -->
  <circle cx="145" cy="170" r="4" fill="#D7CCC8"/>
  <circle cx="235" cy="170" r="4" fill="#D7CCC8"/>

  <!-- Navel -->
  <ellipse cx="190" cy="350" rx="6" ry="8" fill="#D7CCC8" stroke="#BCAAA4" stroke-width="1"/>

  <!-- Large thoracotomy incision -->
  <path d="M100,200 Q140,180 200,185 Q250,190 280,210" fill="none" stroke="#D32F2F" stroke-width="4" stroke-linecap="round"/>
  <!-- Stitch marks -->
  <line x1="120" y1="185" x2="125" y2="198" stroke="#D32F2F" stroke-width="1.5"/>
  <line x1="140" y1="180" x2="145" y2="193" stroke="#D32F2F" stroke-width="1.5"/>
  <line x1="160" y1="180" x2="163" y2="193" stroke="#D32F2F" stroke-width="1.5"/>
  <line x1="180" y1="182" x2="182" y2="195" stroke="#D32F2F" stroke-width="1.5"/>
  <line x1="200" y1="184" x2="201" y2="197" stroke="#D32F2F" stroke-width="1.5"/>
  <line x1="220" y1="186" x2="222" y2="199" stroke="#D32F2F" stroke-width="1.5"/>
  <line x1="240" y1="190" x2="243" y2="203" stroke="#D32F2F" stroke-width="1.5"/>
  <line x1="260" y1="196" x2="264" y2="208" stroke="#D32F2F" stroke-width="1.5"/>

  <!-- Large abdominal incision -->
  <line x1="190" y1="270" x2="190" y2="400" stroke="#D32F2F" stroke-width="4" stroke-linecap="round"/>
  <!-- Stitch marks -->
  <line x1="182" y1="285" x2="198" y2="285" stroke="#D32F2F" stroke-width="1.5"/>
  <line x1="182" y1="305" x2="198" y2="305" stroke="#D32F2F" stroke-width="1.5"/>
  <line x1="182" y1="325" x2="198" y2="325" stroke="#D32F2F" stroke-width="1.5"/>
  <line x1="182" y1="345" x2="198" y2="345" stroke="#D32F2F" stroke-width="1.5"/>
  <line x1="182" y1="365" x2="198" y2="365" stroke="#D32F2F" stroke-width="1.5"/>
  <line x1="182" y1="385" x2="198" y2="385" stroke="#D32F2F" stroke-width="1.5"/>

  <!-- Labels for open surgery -->
  <line x1="280" y1="195" x2="310" y2="180" stroke="#999" stroke-width="0.8"/>
  <text x="315" y="178" font-size="10" fill="#D32F2F">胸部切口 ~15-20cm</text>
  <text x="315" y="191" font-size="9" fill="#999">Thoracotomy</text>

  <line x1="198" y1="335" x2="310" y2="335" stroke="#999" stroke-width="0.8"/>
  <text x="315" y="333" font-size="10" fill="#D32F2F">腹部切口 ~15cm</text>
  <text x="315" y="346" font-size="9" fill="#999">Laparotomy</text>

  <!-- ===== Divider ===== -->
  <line x1="375" y1="70" x2="375" y2="460" stroke="#BDBDBD" stroke-width="1" stroke-dasharray="8,4"/>

  <!-- ===== Right: MIE ===== -->
  <text x="560" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#4CAF50">微創手術 MIE / RAMIE</text>

  <!-- Torso outline - right -->
  <path d="M480,100 Q470,100 465,120 L455,200 Q450,250 455,320 L460,380 Q465,410 480,420 L640,420 Q655,410 660,380 L665,320 Q670,250 665,200 L655,120 Q650,100 640,100 Z" fill="#FFE0B2" stroke="#E65100" stroke-width="1.5"/>

  <!-- Nipple markers -->
  <circle cx="515" cy="170" r="4" fill="#D7CCC8"/>
  <circle cx="605" cy="170" r="4" fill="#D7CCC8"/>

  <!-- Navel -->
  <ellipse cx="560" cy="350" rx="6" ry="8" fill="#D7CCC8" stroke="#BCAAA4" stroke-width="1"/>

  <!-- Small thoracoscopic port incisions (3-4 ports) -->
  <circle cx="490" cy="195" r="5" fill="#2E7D32" stroke="#1B5E20" stroke-width="1.5"/>
  <circle cx="520" cy="210" r="5" fill="#2E7D32" stroke="#1B5E20" stroke-width="1.5"/>
  <circle cx="550" cy="200" r="5" fill="#2E7D32" stroke="#1B5E20" stroke-width="1.5"/>
  <circle cx="620" cy="205" r="5" fill="#2E7D32" stroke="#1B5E20" stroke-width="1.5"/>

  <!-- Small laparoscopic port incisions (4-5 ports) -->
  <circle cx="500" cy="290" r="5" fill="#2E7D32" stroke="#1B5E20" stroke-width="1.5"/>
  <circle cx="530" cy="310" r="5" fill="#2E7D32" stroke="#1B5E20" stroke-width="1.5"/>
  <circle cx="560" cy="300" r="5" fill="#2E7D32" stroke="#1B5E20" stroke-width="1.5"/>
  <circle cx="590" cy="310" r="5" fill="#2E7D32" stroke="#1B5E20" stroke-width="1.5"/>
  <circle cx="620" cy="290" r="5" fill="#2E7D32" stroke="#1B5E20" stroke-width="1.5"/>

  <!-- Camera port label -->
  <line x1="555" y1="195" x2="555" y2="160" stroke="#999" stroke-width="0.8"/>
  <text x="555" y="153" text-anchor="middle" font-size="9" fill="#2E7D32">鏡頭孔 Camera</text>

  <!-- Labels for MIE -->
  <line x1="625" y1="200" x2="670" y2="185" stroke="#999" stroke-width="0.8"/>
  <text x="560" y="237" text-anchor="middle" font-size="10" fill="#2E7D32">胸部：3-4 個小孔 (0.5-1cm)</text>
  <text x="560" y="250" text-anchor="middle" font-size="9" fill="#999">Thoracoscopic ports</text>

  <text x="560" y="340" text-anchor="middle" font-size="10" fill="#2E7D32">腹部：4-5 個小孔 (0.5-1cm)</text>
  <text x="560" y="353" text-anchor="middle" font-size="9" fill="#999">Laparoscopic ports</text>

  <!-- ===== Comparison Table ===== -->
  <rect x="50" y="440" width="650" height="35" rx="5" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="1"/>

  <text x="110" y="462" text-anchor="middle" font-size="11" fill="#F44336" font-weight="bold">傳統開胸</text>
  <text x="250" y="462" text-anchor="middle" font-size="10" fill="#666">切口 30-35cm | 住院 10-14 天 | 恢復 8-12 週</text>

  <line x1="375" y1="445" x2="375" y2="470" stroke="#BDBDBD" stroke-width="1"/>

  <text x="450" y="462" text-anchor="middle" font-size="11" fill="#4CAF50" font-weight="bold">微創手術</text>
  <text x="600" y="462" text-anchor="middle" font-size="10" fill="#666">切口 5-8cm | 住院 7-8 天 | 恢復 4-6 週</text>
</svg>